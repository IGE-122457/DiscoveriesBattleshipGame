name: Complete CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  pages: write
  id-token: write

jobs:
  build-test-deploy:
    name: Build, Test, Analyze and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Verificar dependências (Maven dependency tree)
      - name: Verify dependencies
        run: mvn dependency:tree

      # 4. Compilar o projeto
      - name: Compile project
        run: mvn clean compile

      # 5. Executar testes unitários
      - name: Run unit tests
        run: mvn test

      # 6. Análise de qualidade no SonarQube Cloud
      - name: SonarQube Cloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=IGE-122457_DiscoveriesBattleshipGame \
            -Dsonar.organization=ige-122457 \
            -Dsonar.host.url=https://sonarcloud.io

      # 7. Empacotar JAR
      - name: Package JAR
        run: mvn package -DskipTests

      # 8. Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9. Build e Push da imagem Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            namniyek11/battleship-game:latest
            namniyek11/battleship-game:${{ github.sha }}

      # 10. Gerar Maven site e Javadoc
      - name: Generate Maven site
        run: mvn site

      # 11. Commit e push da documentação atualizada
      - name: Commit updated docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --cached --quiet || git commit -m "Auto-update docs from CI/CD pipeline [skip ci]"
          git push
